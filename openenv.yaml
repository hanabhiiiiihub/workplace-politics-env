# openenv.yaml
name: workplace-politics-env
version: "1.0.0"
description: >
  A workplace political simulation where an AI agent must build coalitions,
  manage information strategically, and get a proposal approved by navigating
  hidden agendas, a sabotaging rival, and limited political capital.

author: your-hf-username
license: MIT

tasks:
  - id: level_1_easy
    name: "Coalition Building (Easy)"
    description: >
      Everyone is honest. Navigate conversations in the right order
      to build enough support before making your formal proposal.
    difficulty: easy
    max_steps: 15
    endpoint: /step
    reset_payload:
      task_level: 1

  - id: level_2_medium
    name: "Against the Rival (Medium)"
    description: >
      The Rival actively undermines you behind the scenes.
      Lock in supporters before they are poisoned against you.
    difficulty: medium
    max_steps: 12
    endpoint: /step
    reset_payload:
      task_level: 2

  - id: level_3_hard
    name: "Budget War (Hard)"
    description: >
      A competing team is lobbying for the same budget. Win the vote,
      expose their weaknesses without looking petty, keep your reputation.
    difficulty: hard
    max_steps: 10
    endpoint: /step
    reset_payload:
      task_level: 3

observation_space:
  type: object
  fields:
    - name: turn
      type: integer
    - name: max_turns
      type: integer
    - name: observable_events
      type: array
      items: string
    - name: your_reputation
      type: float
      range: [0.0, 1.0]
    - name: political_capital
      type: float
      range: [0.0, 1.0]
    - name: known_support
      type: object
    - name: proposal_submitted
      type: boolean
    - name: proposal_outcome
      type: string
      nullable: true

action_space:
  type: object
  fields:
    - name: action_type
      type: string
      enum:
        - schedule_meeting
        - share_info
        - request_support
        - observe
        - build_alliance
        - make_proposal
    - name: target
      type: string
      enum: [boss, rival, friend, gatekeeper, fence_sitter]
    - name: content
      type: string
      nullable: true
    - name: info_level
      type: string
      enum: [full, partial, vague]
      nullable: true

reward:
  range: [-1.0, 1.5]
  description: >
    +1.0 for approved proposal, +speed bonus for fewer turns used,
    +0.15 per key ally secured. Penalties for rival finding out early,
    inconsistency, burning political capital, or running out of turns.

server:
  host: 0.0.0.0
  port: 7860
  reset_endpoint: /reset
  step_endpoint: /step
  state_endpoint: /state